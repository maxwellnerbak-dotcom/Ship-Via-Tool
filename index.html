.result{flex:1;background:#fff;border:1px solid #e0e0dd;border-radius:6px;padding:7px 9px;display:flex;flex-direction:column;justify-content:center;min-height:0}
.result.empty{justify-content:center;align-items:center}
.hint{font-size:11px;color:#aaa;text-align:center}
.label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#999;margin-bottom:2px}
.val{font-size:15px;font-weight:700;color:#1a1a18;line-height:1.1;margin-bottom:6px}
.hub-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.hub-val{font-size:12px;font-weight:600;color:#1a1a18}
.badge{display:inline-block;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;white-space:nowrap}
.hub-colchester{background:#E1F5EE;color:#085041}
.hub-clifton{background:#E6F1FB;color:#0C447C}
.hub-dunkirk{background:#FAEEDA;color:#633806}
.hub-liverpool{background:#EEEDFE;color:#3C3489}
.hub-other{background:#f0f0ee;color:#666}
.divider{border:none;border-top:1px solid #eee;margin:4px 0}
.meta{display:flex;gap:12px;flex-wrap:wrap}
.meta-item{font-size:10px;color:#777}
.meta-item span{font-weight:600;color:#333}
.error-box{background:#fff5f5;border:1px solid #f0c0c0;border-radius:6px;padding:7px 9px;font-size:11px;color:#a32d2d;line-height:1.5}
.warn-box{background:#fffaf0;border:1px solid #f0d890;border-radius:6px;padding:7px 9px}
.multi-item{padding:4px 0;border-bottom:1px solid #f0f0ee}
.multi-item:last-child{border-bottom:none}
.multi-name{font-size:12px;font-weight:700;color:#1a1a18}
.multi-hub{font-size:10px;color:#666;margin-top:1px}
.warn-title{font-size:10px;font-weight:600;color:#854f0b;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}
.status{font-size:9px;color:#bbb;flex-shrink:0;text-align:right;padding-right:1px}
</style>
</head>

function pointInPolygon(lat,lng,polygon){
  let inside=false;
  const x=lng,y=lat;
  for(let i=0,j=polygon.length-1;i<polygon.length;j=i++){
    const xi=polygon[i][0],yi=polygon[i][1];
    const xj=polygon[j][0],yj=polygon[j][1];
    if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}

function hubClass(hub){
  if(!hub)return'hub-other';
  const h=hub.toLowerCase();
  if(h.includes('colchester'))return'hub-colchester';
  if(h.includes('clifton'))return'hub-clifton';
  if(h.includes('dunkirk'))return'hub-dunkirk';
  if(h.includes('liverpool'))return'hub-liverpool';
  return'hub-other';
}

function find(lat,lng){return T.filter(t=>pointInPolygon(lat,lng,t.coordinates));}

function render(matches,zip){
  const r=document.getElementById('result');
  if(matches.length===0){
    r.className='result';
    r.innerHTML=`<div class="error-box">No territory found for zip <strong>${zip}</strong>. May be outside service area or near a boundary.</div>`;
    return;
  }
  if(matches.length===1){
    const t=matches[0];
    const bc=hubClass(t.hub);
    const meta=[];
    if(t.cutoff)meta.push(`<div class="meta-item">Cut-off: <span>${t.cutoff}</span></div>`);
    if(t.departure)meta.push(`<div class="meta-item">Dep: <span>${t.departure}</span></div>`);
    r.className='result';
    r.innerHTML=`
      <div class="label">Ship via</div>
      <div class="val">${t.name}</div>
      <hr class="divider">
      <div class="label">Hub</div>
      <div class="hub-row">
        <div class="hub-val">${t.hub||'—'}</div>
        <span class="badge ${bc}">${t.hub||'—'}</span>
      </div>
      ${meta.length?`<hr class="divider"><div class="meta">${meta.join('')}</div>`:''}`;
    return;
  }
  // multiple
  const items=matches.map(t=>{
    const bc=hubClass(t.hub);
    return`<div class="multi-item"><div class="multi-name">${t.name}</div><div class="multi-hub"><span class="badge ${bc}">${t.hub||'—'}</span></div></div>`;
  }).join('');
  r.className='result';
  r.innerHTML=`<div class="warn-box"><div class="warn-title">${matches.length} overlapping zones — zip ${zip}</div>${items}</div>`;
}

async function doLookup(){
  const zip=document.getElementById('zipIn').value.trim();
  const btn=document.getElementById('btn');
  const st=document.getElementById('status');
  const r=document.getElementById('result');
  if(!/^\d{5}$/.test(zip)){
    r.className='result';
    r.innerHTML=`<div class="error-box">Enter a valid 5-digit zip code.</div>`;
    return;
  }
  btn.disabled=true;
  btn.textContent='…';
  st.textContent='Looking up…';
  r.className='result empty';
  r.innerHTML=`<div class="hint">Searching…</div>`;
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?postalcode=${zip}&country=US&format=json&limit=1`,{headers:{'Accept-Language':'en'}});
    const data=await res.json();
    if(!data||!data.length){
      st.textContent='';
      r.className='result';
      r.innerHTML=`<div class="error-box">Zip code ${zip} not found.</div>`;
      return;
    }
    const lat=parseFloat(data[0].lat),lng=parseFloat(data[0].lon);
    st.textContent=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    render(find(lat,lng),zip);
  }catch(e){
    st.textContent='';
    r.className='result';
    r.innerHTML=`<div class="error-box">Network error. Check connection.</div>`;
  }finally{
    btn.disabled=false;
    btn.textContent='Go';
  }
}

document.getElementById('zipIn').addEventListener('keydown',e=>{if(e.key==='Enter')doLookup();});
